# 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/lottery_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:generator/mapper/*.xml
mybatis-plus.type-aliases-package=com.amadeus.lotterysystem.dao.dataobject
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.configuration.type-handlers-package=com.amadeus.lotterysystem.dao.handler

# 日志配置
logging.level.com.amadeus.lotterysystem.dao.mapper=debug
