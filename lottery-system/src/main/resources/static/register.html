<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户注册</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            color: #1f2933;
            background: #f6f8fb;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .register-panel {
            width: 100%;
            max-width: 460px;
            padding: 32px;
            background: #fff;
            border: 1px solid #e6eaf0;
            border-radius: 8px;
            box-shadow: 0 16px 36px rgba(31, 41, 51, 0.08);
        }

        h1 {
            margin: 0 0 24px;
            font-size: 26px;
            line-height: 1.3;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            height: 42px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        input:focus,
        select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .hint {
            margin-top: 6px;
            font-size: 12px;
            color: #697586;
        }

        .error-text {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #d92d20;
        }

        .actions {
            margin-top: 24px;
        }

        button {
            width: 100%;
            height: 44px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            background: #93a4bc;
        }

        .message {
            display: none;
            margin-top: 18px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.success {
            display: block;
            color: #05603a;
            background: #ecfdf3;
            border: 1px solid #abefc6;
        }

        .message.error {
            display: block;
            color: #b42318;
            background: #fef3f2;
            border: 1px solid #fecdca;
        }
    </style>
</head>
<body>
<main class="page">
    <section class="register-panel">
        <h1>用户注册</h1>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" autocomplete="name" placeholder="请输入姓名">
                <div class="error-text" data-error-for="name"></div>
            </div>

            <div class="form-group">
                <label for="mail">邮箱</label>
                <input type="email" id="mail" name="mail" autocomplete="email" placeholder="例如 114514@qq.com">
                <div class="error-text" data-error-for="mail"></div>
            </div>

            <div class="form-group">
                <label for="phoneNumber">手机号</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" autocomplete="tel" placeholder="请输入 11 位手机号">
                <div class="error-text" data-error-for="phoneNumber"></div>
            </div>

            <div class="form-group">
                <label for="identity">身份</label>
                <select id="identity" name="identity">
                    <option value="NORMAL">普通用户</option>
                    <option value="ADMIN">管理员</option>
                </select>
            </div>

            <div class="form-group" id="passwordGroup">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" autocomplete="new-password" placeholder="6-12 位数字或字母">
                <div class="hint" id="passwordHint">普通用户可不填密码；管理员必须填写。</div>
                <div class="error-text" data-error-for="password"></div>
            </div>

            <div class="actions">
                <button type="submit" id="submitBtn">注册</button>
            </div>
        </form>

        <div id="message" class="message"></div>
    </section>
</main>

<script>
    var form = document.getElementById('registerForm');
    var submitBtn = document.getElementById('submitBtn');
    var message = document.getElementById('message');
    var identity = document.getElementById('identity');
    var password = document.getElementById('password');
    var passwordHint = document.getElementById('passwordHint');

    var params = new URLSearchParams(window.location.search);
    if (params.get('admin') === 'true') {
        identity.value = 'ADMIN';
    }

    identity.addEventListener('change', updatePasswordHint);
    updatePasswordHint();

    form.addEventListener('submit', function (event) {
        event.preventDefault();
        clearErrors();
        setMessage('', '');

        var payload = {
            name: getValue('name'),
            mail: getValue('mail').toLowerCase(),
            phoneNumber: getValue('phoneNumber'),
            password: getValue('password'),
            identity: getValue('identity')
        };

        if (payload.identity === 'NORMAL' && payload.password === '') {
            delete payload.password;
        }

        var errors = validatePayload(payload);
        if (Object.keys(errors).length > 0) {
            showErrors(errors);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';

        fetch('/user/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
            .then(function (response) {
                return response.text();
            })
            .then(function (text) {
                var result = parseRegisterResult(text);

                if (!result || result.code !== 200) {
                    throw new Error((result && result.errorMsg) || '注册失败，请检查填写信息');
                }

                if (result.userId) {
                    localStorage.setItem('userId', result.userId);
                }

                form.reset();
                identity.value = payload.identity;
                updatePasswordHint();
                setMessage('success', '注册成功，用户ID：' + (result.userId || '已生成'));
            })
            .catch(function (error) {
                setMessage('error', error.message || '注册失败，请稍后重试');
            })
            .finally(function () {
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            });
    });

    function getValue(id) {
        return document.getElementById(id).value.trim();
    }

    function updatePasswordHint() {
        if (identity.value === 'ADMIN') {
            passwordHint.textContent = '管理员必须填写 6-12 位数字或字母密码。';
            password.setAttribute('required', 'required');
            return;
        }

        passwordHint.textContent = '普通用户可不填密码；如填写，需为 6-12 位数字或字母。';
        password.removeAttribute('required');
    }

    function validatePayload(payload) {
        var errors = {};
        var phoneReg = /^1[3-9][0-9]{9}$/;
        var passwordReg = /^[0-9A-Za-z]{6,12}$/;
        var mailReg = /^[a-z0-9]+([._\\-]*[a-z0-9])*@([a-z0-9]+[-a-z0-9]*[a-z0-9]+\.){1,63}[a-z0-9]+$/;

        if (!payload.name) {
            errors.name = '请输入姓名';
        }

        if (!payload.mail) {
            errors.mail = '请输入邮箱';
        } else if (!mailReg.test(payload.mail)) {
            errors.mail = '邮箱格式不正确，建议使用小写字母和数字';
        }

        if (!payload.phoneNumber) {
            errors.phoneNumber = '请输入手机号';
        } else if (!phoneReg.test(payload.phoneNumber)) {
            errors.phoneNumber = '手机号格式不正确';
        }

        if (payload.identity === 'ADMIN' && !payload.password) {
            errors.password = '管理员必须填写密码';
        } else if (payload.password && !passwordReg.test(payload.password)) {
            errors.password = '密码必须是 6-12 位数字或字母';
        }

        return errors;
    }

    function clearErrors() {
        document.querySelectorAll('.error-text').forEach(function (item) {
            item.textContent = '';
            item.style.display = 'none';
        });
    }

    function showErrors(errors) {
        Object.keys(errors).forEach(function (field) {
            var target = document.querySelector('[data-error-for="' + field + '"]');
            if (target) {
                target.textContent = errors[field];
                target.style.display = 'block';
            }
        });
    }

    function setMessage(type, text) {
        message.className = 'message';
        message.textContent = '';

        if (!type || !text) {
            return;
        }

        message.classList.add(type);
        message.textContent = text;
    }

    function parseRegisterResult(text) {
        var parsed = JSON.parse(text);
        var userIdMatch = text.match(/"userId"\s*:\s*"?(\d+)"?/);

        return {
            code: parsed.code,
            errorMsg: parsed.errorMsg,
            userId: userIdMatch ? userIdMatch[1] : parsed.data && String(parsed.data.userId)
        };
    }
</script>
</body>
</html>
