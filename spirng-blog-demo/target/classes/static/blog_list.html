<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客列表页</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/list.css">

</head>

<body>
    <div class="nav">
        <img src="pic/logo2.jpg" alt="">
        <span class="blog-title">我的博客系统</span>
        <div class="space"></div>
        <a class="nav-span" href="blog_list.html">主页</a>
        <a class="nav-span" href="blog_edit.html">写博客</a>
        <a class="nav-span" href="#" onclick="logout()">注销</a>
    </div>

    <div class="container">
        <div class="left">
            <div class="card">
                <img src="pic/doge.jpg" alt="">
                <h3></h3>
                <a href="#">GitHub 地址</a>
                <div class="row">
                    <span>文章</span>
                    <span>分类</span>
                </div>
                <div class="row">
                    <span>2</span>
                    <span>1</span>
                </div>
            </div>
        </div>
        <div class="right">
        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        let currentUserId = null;

        getUserInfoAndLoadBlogs();

        function getUserInfoAndLoadBlogs() {
            let url = "/user/getUserInfo?userId="+localStorage.getItem("login_userid");
            $.ajax({
                type: "get",
                url: url,
                success: function (result) {
                    if (result != null && result.code === 200 && result.data != null) {
                        let userInfo = result.data;
                        currentUserId = userInfo.userId;
                        $(".left .card h3").text(userInfo.userName || "");
                        if (userInfo.githubUrl) {
                            $(".left .card a").attr("href", userInfo.githubUrl);
                        }
                    }
                    getBlogList();
                },
                error: function(xhr, status, error) {
                    console.error("获取用户信息失败:", status, error);
                    getBlogList();
                }
            });
        }

        function getBlogList() {
            $.ajax({
                type: "get",
                url: "/blog/getList",
                success: function (result) {
                    if (result.code == 200 && result.data != null) {
                        let finalHtml = "";
                        for (let blog of result.data) {
                            finalHtml +='<div class="blog">';
                            finalHtml +='<div class="title">'+blog.title+'</div>';
                            finalHtml +='<div class="date">'+blog.localDateTime+'</div>';
                            finalHtml +='<div class="desc">'+blog.content+'</div>';
                            finalHtml +='<a class="detail" href="blog_detail.html?blogId='+blog.id+'">查看全文&gt;&gt;</a>';
                            if (currentUserId && blog.userId == currentUserId) {
                                finalHtml +='<button class="delete-btn" onclick="deleteBlog('+blog.id+')">删除</button>';
                            }
                            finalHtml +='</div>';
                        }
                        $(".container .right").html(finalHtml);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("请求失败:", status, error);
                }
            });
        }

        function deleteBlog(blogId) {
            if (!confirm('确定要删除这篇博客吗？')) {
                return;
            }

            $.ajax({
                type: "post",
                url: "/blog/deleteBlog",
                data: { blogId: blogId },
                success: function (result) {
                    if (result) {
                        alert('删除成功');
                        getBlogList();
                    } else {
                        alert('删除失败');
                    }
                },
                error: function(xhr, status, error) {
                    console.error("删除失败:", status, error);
                    alert('删除失败，请重试');
                }
            });
        }
    </script>
</body>

</html>
